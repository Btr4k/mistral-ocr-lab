services:
  ocr-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mistral-ocr-lab
    restart: unless-stopped
    init: true
    env_file:
      - .env.production
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NODE_ENV: production
    ports:
      - "127.0.0.1:3010:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 768M
